name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build Gate — populates the shared nix store. Self-hosted nixos
  # runners share /nix; without a single warming job, every downstream
  # job evaluates the same derivations and fights the eval-cache lock.
  build-gate:
    name: Build Gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build all flake checks (except the smoke-test verdict)
        run: >-
          nix build --quiet
          .#checks.x86_64-linux.amaru
          .#checks.x86_64-linux.db-synthesizer
          .#checks.x86_64-linux.db-analyser
          .#checks.x86_64-linux.snapshot-converter
          .#checks.x86_64-linux.shellcheck
          .#checks.x86_64-linux.smoke-test-bats

  # The Phase 1 verdict job. Runs the bridged orchestrator end-to-end
  # against the vendored fixture; its pass/fail confirms the no-fork
  # bridge closes the format gap. Phase 0's "FAIL: format mismatch is
  # also acceptable" branch is gone — Phase 1 commits to PASS.
  smoke-test:
    name: Smoke Test (Phase 1 verdict)
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run smoke test
        run: |
          out_dir="$RUNNER_TEMP/smoke-out"
          rm -rf "$out_dir"
          # The orchestrator exits non-zero on every FAIL: ... per
          # contracts/smoke-test-cli.md. We capture-and-ignore that
          # exit code; the case statement below decides the job's
          # pass/fail from the verdict string.
          set +e
          nix run --quiet .#smoke-test -- \
            specs/001-snapshot-format-smoke/fixtures/p1-config \
            "$out_dir" \
            2>&1 | tee "$RUNNER_TEMP/verdict.log"
          set -e
          verdict="$(tail -n 1 "$RUNNER_TEMP/verdict.log")"
          report="$(tail -n 2 "$RUNNER_TEMP/verdict.log" | head -n 1)"
          {
            echo "## Phase 1 Verdict"
            echo
            echo "**\`$verdict\`**"
            echo
            echo "Report: \`${report#report: }\`"
          } >>"$GITHUB_STEP_SUMMARY"
          case "$verdict" in
            PASS)
              echo "::notice::Phase 1 PASS — bridged pipeline closes the format gap, no fork required" ;;
            *)
              echo "::error::Phase 1 verdict not PASS: $verdict"
              exit 1 ;;
          esac
      - name: Upload verdict artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-out
          path: ${{ runner.temp }}/smoke-out
          if-no-files-found: warn
          retention-days: 30
